<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4年生 漢字テスト</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', Meiryo, sans-serif;
  background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 50%, #fd79a8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: white;
  border-radius: 28px;
  padding: 36px 32px;
  max-width: 560px;
  width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.screen { display: none; }
.screen.active { display: block; }

/* ── 設定画面 ─────────────────── */
.app-title {
  font-size: 2.4rem;
  color: #6c5ce7;
  text-align: center;
  margin-bottom: 4px;
}
.app-grade {
  text-align: center;
  color: #a29bfe;
  font-size: 1rem;
  font-weight: bold;
  margin-bottom: 32px;
}

.section-label {
  font-size: 0.95rem;
  color: #636e72;
  margin-bottom: 10px;
  font-weight: bold;
}

.btn-group {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}

.select-btn {
  flex: 1;
  padding: 14px 8px;
  border: 3px solid #e0e0e0;
  border-radius: 16px;
  background: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  color: #2d3436;
  line-height: 1.5;
}

.select-btn:hover {
  border-color: #a29bfe;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(108,92,231,0.15);
}

.select-btn.selected {
  border-color: #6c5ce7;
  background: #6c5ce7;
  color: white;
  box-shadow: 0 6px 20px rgba(108,92,231,0.4);
  transform: translateY(-2px);
}

.select-btn.unavailable {
  border-color: #e0e0e0;
  background: #f5f5f5;
  color: #ccc;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
.select-btn.unavailable:hover {
  border-color: #e0e0e0;
  transform: none;
  box-shadow: none;
}

.btn-start {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 1.3rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: 2px;
}

.btn-start:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(108,92,231,0.5);
}

.btn-start:disabled {
  background: #dfe6e9;
  cursor: not-allowed;
  color: #b2bec3;
}

.btn-pdf {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  margin-top: 12px;
  letter-spacing: 1px;
}

.btn-pdf:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,184,148,0.4);
}

/* ── PDF モーダル ──────────────── */
.pdf-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.pdf-overlay.open { display: flex; }

.pdf-modal {
  background: white;
  border-radius: 24px;
  padding: 30px 26px;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.28);
  animation: slideUp 0.3s ease;
}

.pdf-modal-title {
  font-size: 1.35rem;
  color: #00b894;
  font-weight: bold;
  text-align: center;
  margin-bottom: 22px;
}

.btn-pdf-gen {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #e17055, #d63031);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-top: 6px;
  letter-spacing: 1px;
}

.btn-pdf-gen:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(214,48,49,0.4);
}

.btn-pdf-gen:disabled {
  background: #dfe6e9;
  color: #b2bec3;
  cursor: not-allowed;
}

.btn-modal-close {
  width: 100%;
  padding: 12px;
  background: white;
  color: #636e72;
  border: 2px solid #e0e0e0;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-modal-close:hover { background: #f8f9ff; }

/* ── クイズ画面 ───────────────── */
.quiz-mode-info {
  text-align: center;
  font-size: 0.82rem;
  color: #fff;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 20px;
  padding: 5px 14px;
  margin-bottom: 12px;
  font-weight: bold;
  letter-spacing: 0.5px;
  display: inline-block;
  width: 100%;
}

.progress-text {
  text-align: right;
  font-size: 0.9rem;
  color: #636e72;
  margin-bottom: 6px;
}

.progress-wrap {
  background: #f0f0f0;
  border-radius: 12px;
  height: 14px;
  margin-bottom: 28px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 12px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.type-badge {
  display: inline-block;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  margin-bottom: 16px;
}

.type-badge.reading { background: #74b9ff; color: white; }
.type-badge.writing { background: #a29bfe; color: white; }
.type-badge.fill    { background: #00b894; color: white; }

.question-sentence {
  font-size: 1.5rem;
  font-weight: bold;
  color: #2d3436;
  background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
  border-radius: 20px;
  padding: 22px 20px;
  margin-bottom: 20px;
  line-height: 1.9;
  border: 2px solid #e8e8ff;
  text-align: center;
}

.question-word {
  text-align: center;
  font-size: 3.6rem;
  font-weight: bold;
  color: #2d3436;
  background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
  border-radius: 20px;
  padding: 28px 20px;
  margin-bottom: 20px;
  letter-spacing: 6px;
  border: 2px solid #e8e8ff;
}

.question-hint {
  text-align: center;
  color: #888;
  font-size: 0.9rem;
  margin-bottom: 14px;
}

.answer-input {
  width: 100%;
  padding: 16px 20px;
  border: 3px solid #e0e0e0;
  border-radius: 16px;
  font-size: 1.4rem;
  font-family: inherit;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.answer-input:focus {
  border-color: #6c5ce7;
  box-shadow: 0 0 0 4px rgba(108,92,231,0.12);
}

.btn-check {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.2rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 14px;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-check:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,184,148,0.4);
}

.btn-check:disabled { background: #dfe6e9; cursor: not-allowed; }

/* ── 手書きキャンバス ─────────── */
.canvas-wrapper {
  width: 100%;
  aspect-ratio: 1;
  background: white;
  border: 3px solid #a29bfe;
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  cursor: crosshair;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

#draw-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  touch-action: none;
  display: block;
}

.canvas-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.btn-canvas {
  flex: 1;
  padding: 14px 8px;
  border-radius: 14px;
  border: none;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-erase {
  background: #f0f0f0;
  color: #636e72;
}

.btn-erase:hover { background: #e0e0e0; transform: translateY(-1px); }

.btn-reveal {
  background: linear-gradient(135deg, #fdcb6e, #e17055);
  color: white;
}

.btn-reveal:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(225,112,85,0.4);
}

.btn-reveal:disabled {
  background: #dfe6e9;
  color: #b2bec3;
  cursor: not-allowed;
}

.answer-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
  border: 2px solid #a29bfe;
  border-radius: 20px;
  padding: 20px 16px;
  margin-bottom: 12px;
  animation: slideUp 0.3s ease;
}

.answer-label {
  font-size: 1rem;
  color: #636e72;
  font-weight: bold;
  white-space: nowrap;
}

.correct-kanji {
  font-size: 4rem;
  font-weight: bold;
  color: #6c5ce7;
  line-height: 1;
}

.self-check-label {
  text-align: center;
  color: #636e72;
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.self-check-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
}

.btn-self {
  flex: 1;
  padding: 16px 8px;
  border: none;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-self-correct {
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
}

.btn-self-correct:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,184,148,0.4);
}

.btn-self-wrong {
  background: linear-gradient(135deg, #d63031, #e17055);
  color: white;
}

.btn-self-wrong:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(214,48,49,0.4);
}

.btn-self:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

.feedback {
  text-align: center;
  font-size: 1.05rem;
  font-weight: bold;
  padding: 14px 16px;
  border-radius: 16px;
  margin: 12px 0;
  display: none;
  line-height: 1.7;
}

.feedback.correct {
  display: block;
  background: #d4edda;
  color: #155724;
}

.feedback.wrong {
  display: block;
  background: #fff3cd;
  color: #856404;
}

.btn-next {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.15rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  display: none;
  letter-spacing: 1px;
}

.btn-next:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(108,92,231,0.4);
}

/* ── 結果画面 ─────────────────── */
.result-title {
  font-size: 1.8rem;
  color: #2d3436;
  text-align: center;
  margin-bottom: 14px;
}

.stars {
  text-align: center;
  font-size: 2.8rem;
  margin-bottom: 14px;
  min-height: 52px;
}

.stars span {
  display: inline-block;
  opacity: 0;
  animation: starPop 0.45s ease forwards;
}
.stars span:nth-child(1) { animation-delay: 0.1s; }
.stars span:nth-child(2) { animation-delay: 0.28s; }
.stars span:nth-child(3) { animation-delay: 0.46s; }

@keyframes starPop {
  0%   { opacity: 0; transform: scale(0) rotate(-20deg); }
  65%  { transform: scale(1.35) rotate(10deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

.score-area {
  text-align: center;
  margin-bottom: 20px;
}

.score-circle {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 12px 36px rgba(108,92,231,0.4);
}

.score-num { font-size: 3.2rem; font-weight: bold; color: white; line-height: 1; }
.score-den { font-size: 1rem; color: rgba(255,255,255,0.85); margin-top: 4px; }
.score-msg { font-size: 1.4rem; font-weight: bold; color: #2d3436; margin-bottom: 6px; }
.score-sub { color: #636e72; font-size: 0.95rem; }

.review-wrap {
  background: #f8f9ff;
  border-radius: 16px;
  padding: 16px 20px;
  margin: 16px 0 20px;
  max-height: 240px;
  overflow-y: auto;
}

.review-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid #e8e8ff;
  gap: 8px;
}

.review-item:last-child { border-bottom: none; }
.ri-word { font-weight: bold; font-size: 1.05rem; color: #2d3436; }
.ri-reading { color: #888; font-size: 0.88rem; }
.ri-status { font-size: 1.2rem; flex-shrink: 0; }

.btn-retry {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #fd79a8, #e84393);
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.btn-retry:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,67,147,0.4);
}

.btn-home {
  width: 100%;
  padding: 14px;
  background: white;
  color: #6c5ce7;
  border: 3px solid #6c5ce7;
  border-radius: 16px;
  font-size: 1.05rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-home:hover { background: #f8f9ff; transform: translateY(-2px); }

/* ── アニメーション ───────────── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-10px); }
  40%      { transform: translateX(10px); }
  60%      { transform: translateX(-7px); }
  80%      { transform: translateX(7px); }
}

.shake { animation: shake 0.42s ease; }

/* ── レスポンシブ ─────────────── */
@media (max-width: 480px) {
  .card { padding: 28px 18px; }
  .app-title { font-size: 1.9rem; }
  .question-word { font-size: 2.8rem; }
  .correct-kanji { font-size: 3.2rem; }
}
</style>
</head>
<body>
<div class="card">

  <!-- ========== 設定画面 ========== -->
  <div id="screen-start" class="screen active">
    <div class="app-title">📖 漢字テスト</div>
    <div class="app-grade">小学3・4年生</div>

    <div class="section-label">🎓 学年を選ぼう</div>
    <div class="btn-group" id="grp-grade">
      <button class="select-btn" onclick="pick('grade',3,this)">3年生</button>
      <button class="select-btn" onclick="pick('grade',4,this)">4年生</button>
    </div>

    <div class="section-label">📅 学期を選ぼう</div>
    <div class="btn-group" id="grp-semester">
      <button class="select-btn" id="sem-btn-1" onclick="pick('semester',1,this)">1学期</button>
      <button class="select-btn" id="sem-btn-2" onclick="pick('semester',2,this)">2学期</button>
      <button class="select-btn" id="sem-btn-3" onclick="pick('semester',3,this)">3学期</button>
    </div>

    <div class="section-label">📝 問題の種類を選ぼう</div>
    <div class="btn-group" style="flex-wrap:wrap;" id="grp-type">
      <button class="select-btn" onclick="pick('type','random',this)" style="min-width:45%;">
        🎲 ランダム<br><small style="font-weight:normal;font-size:0.78em">読み・書き・穴埋め混合</small>
      </button>
      <button class="select-btn" onclick="pick('type','reading',this)" style="min-width:45%;">
        📖 読みのみ<br><small style="font-weight:normal;font-size:0.78em">漢字→ひらがな</small>
      </button>
      <button class="select-btn" onclick="pick('type','writing',this)" style="min-width:45%;">
        ✏️ 書きのみ<br><small style="font-weight:normal;font-size:0.78em">ひらがな→手書き</small>
      </button>
      <button class="select-btn" onclick="pick('type','fill',this)" style="min-width:45%;">
        📝 穴埋めのみ<br><small style="font-weight:normal;font-size:0.78em">文中の（　）に記入</small>
      </button>
    </div>

    <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>
      スタート！🚀
    </button>
    <button class="btn-pdf" onclick="openPdfModal()">
      📄 プリントテストを作る
    </button>
  </div>

  <!-- ========== クイズ画面 ========== -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-mode-info" id="quiz-mode-info"></div>
    <div class="progress-text" id="prog-text">問題 1 / 10</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="prog-bar" style="width:10%"></div>
    </div>
    <div id="question-area"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">つぎへ →</button>
  </div>

  <!-- ========== 結果画面 ========== -->
  <div id="screen-result" class="screen">
    <div class="result-title">📊 テスト結果</div>
    <div class="stars" id="stars"></div>
    <div class="score-area">
      <div class="score-circle">
        <div class="score-num" id="sc-num">0</div>
        <div class="score-den" id="sc-den">/ 10もん</div>
      </div>
      <div class="score-msg" id="sc-msg"></div>
      <div class="score-sub" id="sc-sub"></div>
    </div>
    <div class="review-wrap" id="review"></div>
    <button class="btn-retry" onclick="startQuiz()">もう一度チャレンジ！🔥</button>
    <button class="btn-home" onclick="goHome()">🏠 ホームにもどる</button>
  </div>

</div>

<!-- ========== PDF モーダル ========== -->
<div class="pdf-overlay" id="pdf-overlay" onclick="overlayClick(event)">
  <div class="pdf-modal">
    <div class="pdf-modal-title">📄 プリントテストを作る</div>

    <div class="section-label">🎓 学年を選ぼう</div>
    <div class="btn-group" id="pdf-grp-grade">
      <button class="select-btn" onclick="pickPdf('grade',3,this)">3年生</button>
      <button class="select-btn" onclick="pickPdf('grade',4,this)">4年生</button>
    </div>

    <div class="section-label">📅 学期を選ぼう</div>
    <div class="btn-group" id="pdf-grp-semester">
      <button class="select-btn" id="pdf-sem-btn-1" onclick="pickPdf('semester',1,this)">1学期</button>
      <button class="select-btn" id="pdf-sem-btn-2" onclick="pickPdf('semester',2,this)">2学期</button>
      <button class="select-btn" id="pdf-sem-btn-3" onclick="pickPdf('semester',3,this)">3学期</button>
    </div>

    <div class="section-label">📝 問題の種類を選ぼう</div>
    <div class="btn-group" style="flex-wrap:wrap;" id="pdf-grp-type">
      <button class="select-btn" onclick="pickPdf('qtype','random',this)" style="min-width:45%;">
        🎲 ランダム<br><small style="font-weight:normal;font-size:0.78em">読み・書き・穴埋め</small>
      </button>
      <button class="select-btn" onclick="pickPdf('qtype','reading',this)" style="min-width:45%;">
        📖 読みのみ<br><small style="font-weight:normal;font-size:0.78em">漢字→ひらがな</small>
      </button>
      <button class="select-btn" onclick="pickPdf('qtype','writing',this)" style="min-width:45%;">
        ✏️ 書きのみ<br><small style="font-weight:normal;font-size:0.78em">ひらがな→漢字</small>

            .forEach(b => b.classList.remove('selected'));
    updateSemesterButtons('grp-semester', 'sem-btn', val);
    updateTypeButtons(val, null);

  if (kind === 'semester') {

    sel.type = null;
    document.querySelectorAll('#grp-type .select-btn').forEach(b => b.classList.remove('selected'));
    updateTypeButtons(sel.grade, val);

  [1, 2, 3].forEach(sem => {

    if (!btn) return;
    const hasData = DATA[grade][sem] && DATA[grade][sem].length > 0;
    btn.classList.toggle('unavailable', !hasData);

// ================================================================
//  PDF 生成
// ================================================================
function generatePdf() {
  const pool  = shuffle([...DATA[pdfSel.grade][pdfSel.semester]]);
  const count = pdfSel.count;
  const items = pool.slice(0, count);

  // 問題タイプを選択に応じて割り当て
  let types;
  if (pdfSel.qtype === 'reading') {
    types = Array(count).fill('reading');
  } else if (pdfSel.qtype === 'writing') {
    // 書きのみ：書き と 穴埋め を半々
    types = Array.from({ length: count }, (_, i) => i % 2 === 0 ? 'writing' : 'fill');
    shuffle(types);
  } else if (pdfSel.qtype === 'fill') {
    types = Array(count).fill('fill');
  } else {
    // ランダム：3年生は読み・書きのみ、4年生は穴埋めも含む
    if (pdfSel.grade === 3) {
      types = Array.from({ length: count }, (_, i) => i % 2 === 0 ? 'reading' : 'writing');
    } else {
      types = Array.from({ length: count }, (_, i) => ['reading', 'writing', 'fill'][i % 3]);
    }
    shuffle(types);
  }

  const questions = items.map((q, i) => ({ ...q, qtype: types[i] }));
  const html = buildPdfHtml(pdfSel.grade, pdfSel.semester, pdfSel.qtype, count, questions);
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

function makeBlanks(word) {
  // 四角を文字数分並べる（書き・穴埋め用）
  return '<span class="ans-boxes">' +
    [...word].map(() => '<span class="ans-box"></span>').join('') +
    '</span>';
}

function makeSentenceWithBlank(sentence, word) {
  const blank = '（' + '　'.repeat(word.length) + '）';
  return sentence.replace(word, blank);
}

function buildPdfHtml(grade, semester, qtype, count, questions) {
  const semLabel  = `${grade}年生 ${semester}学期`;
  const typeStr   = qtype === 'reading' ? '読みのみ' :
                    qtype === 'writing' ? '書きのみ' :
                    qtype === 'fill'    ? '穴埋めのみ' : 'ランダム（混合）';

  const qHtml = questions.map((q, i) => {
    let inner = '';
    if (q.qtype === 'reading') {
      inner = `
        <div class="q-label-badge reading">読み</div>
        <div class="q-word">${q.word}</div>
        <div class="q-inst">よみかたをひらがなで書きましょう</div>
        <div class="ans-line"></div>`;
    } else if (q.qtype === 'writing') {
      const hasOku = /[ぁ-ん]$/.test(q.word);
      inner = `

        <div class="q-inst">漢字で書きましょう${hasOku ? '（送りがなも）' : ''}</div>
        <div class="ans-with-ruby">
          ${makeBlanks(q.word)}
          <div class="ans-furigana">よみ：${q.reading}</div>

    } else {
      const sentenceWithRuby = q.sentence.replace(q.word,
        `<ruby>（${'　'.repeat(q.word.length)}）<rt>${q.reading}</rt></ruby>`);
      inner = `
        <div class="q-label-badge fill">穴埋め</div>
        <div class="q-sentence">${sentenceWithRuby}</div>
        <div class="q-inst">（　）に漢字を書きましょう</div>
        <div class="ans-with-ruby">
          ${makeBlanks(q.word)}

        </div>`;
    }
    return `
      <div class="q-card">
        <div class="q-num">（${i + 1}）</div>
        ${inner}
      </div>`;
  }).join('');

  return `<!DOCTYPE html>

// ================================================================
//  クイズ開始
// ================================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const pool = shuffle([...DATA[sel.grade][sel.semester]]);
  const qtypes = buildQtypes(sel.type, 10);
  qs = pool.slice(0, 10).map((q, i) => ({ ...q, qtype: qtypes[i] }));
  idx      = 0;
  score    = 0;
  answered = false;
  results  = [];

  // モード情報ラベル
  const gradeLabel = `${sel.grade}年生`;
  const semLabel   = `${sel.semester}学期`;
  document.getElementById('quiz-mode-info').textContent =
    `${gradeLabel} ${semLabel} ・ ${typeLabel(sel.type)} ・ 10問`;

  showScreen('screen-quiz');
  renderQ();
}

function buildQtypes(type, count) {
  if (type === 'reading') return Array(count).fill('reading');
  if (type === 'writing') return Array(count).fill('writing');
  if (type === 'fill')    return Array(count).fill('fill');
  const arr = Array.from({ length: count }, (_, i) => ['reading', 'writing', 'fill'][i % 3]);
  return shuffle(arr);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

    area.innerHTML = `

        <span class="type-badge fill">📝 穴埋めテスト</span>
      </div>
      <div class="question-sentence">${sentenceWithBlank}</div>
      <p class="question-hint">（　）に入る言葉の読みをひらがなで入力してね</p>
      <input class="answer-input" id="ans-input" type="text"
             placeholder="ひらがなで入力…" autocomplete="off" autocorrect="off" autocapitalize="none">
      <button class="btn-check" id="btn-check">こたえる ✔</button>
    `;
    const inp = document.getElementById('ans-input');
    const chk = document.getElementById('btn-check');
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkReading(); });
    chk.addEventListener('click', checkReading);
    setTimeout(() => inp.focus(), 60);

  } else {
    area.innerHTML = `
      <div style="text-align:center;margin-bottom:14px;">
        <span class="type-badge writing">✏️ 書きテスト</span>
      </div>
      <div class="question-word" style="font-size:2.4rem;letter-spacing:4px;padding:20px;">${q.reading}</div>
      <p class="question-hint">↓ 枠の中に漢字を手書きしてね</p>
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="draw-canvas"></canvas>
      </div>
      <div class="canvas-btns">
        <button class="btn-canvas btn-erase" id="btn-erase">消す 🗑️</button>
        <button class="btn-canvas btn-reveal" id="btn-reveal">正解を見る 👀</button>
      </div>
      <div id="answer-reveal" style="display:none;">
        <div class="answer-display">
          <div class="answer-label">正解：</div>
          <div class="correct-kanji" id="correct-kanji"></div>
        </div>
        <p class="self-check-label">自分で採点してね</p>
        <div class="self-check-btns">
          <button class="btn-self btn-self-correct" id="btn-self-correct">✅ 合ってた！</button>
          <button class="btn-self btn-self-wrong"   id="btn-self-wrong">❌ 間違ってた</button>
        </div>
      </div>
    `;

    document.getElementById('btn-erase').addEventListener('click', clearCanvas);
    document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
    document.getElementById('btn-self-correct').addEventListener('click', () => selfScore(true));
    document.getElementById('btn-self-wrong').addEventListener('click',   () => selfScore(false));

    setTimeout(initCanvas, 0);
  }
}

// ================================================================
//  キャンバス初期化
// ================================================================
function initCanvas() {
  const canvas  = document.getElementById('draw-canvas');
  const wrapper = document.getElementById('canvas-wrapper');
  if (!canvas || !wrapper) return;

  const dpr = window.devicePixelRatio || 1;
  canvasCSS = wrapper.clientWidth;

  canvas.width  = Math.round(canvasCSS * dpr);
  canvas.height = Math.round(canvasCSS * dpr);

  drawCtx = canvas.getContext('2d');
  drawCtx.scale(dpr, dpr);

  drawGuideLines();

  drawCtx.strokeStyle = '#1a1a2e';
  drawCtx.lineWidth   = 5;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';

  canvas.addEventListener('mousedown',  onMouseDown);
  canvas.addEventListener('mousemove',  onMouseMove);
  canvas.addEventListener('mouseup',    onMouseUp);
  canvas.addEventListener('mouseleave', onMouseUp);

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
}

function drawGuideLines() {
  if (!drawCtx) return;
  const s = canvasCSS;
  const m = 10;
  drawCtx.save();
  drawCtx.strokeStyle = '#d0d0e8';
  drawCtx.lineWidth   = 1;
  drawCtx.setLineDash([5, 5]);
  drawCtx.beginPath();
  drawCtx.moveTo(s / 2, m);       drawCtx.lineTo(s / 2, s - m);
  drawCtx.moveTo(m, s / 2);       drawCtx.lineTo(s - m, s / 2);
  drawCtx.stroke();
  drawCtx.setLineDash([]);
  drawCtx.restore();
}

function clearCanvas() {
  if (!drawCtx) return;
  drawCtx.clearRect(0, 0, canvasCSS, canvasCSS);
  drawGuideLines();
  drawCtx.strokeStyle = '#1a1a2e';
  drawCtx.lineWidth   = 5;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';
}

function getPos(canvas, e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onMouseDown(e) {
  isDrawing = true;
  const { x, y } = getPos(e.target, e);
  drawCtx.beginPath();
  drawCtx.moveTo(x, y);
}

function onMouseMove(e) {
  if (!isDrawing) return;
  const { x, y } = getPos(e.target, e);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  drawCtx.beginPath();
  drawCtx.moveTo(x, y);
}

function onMouseUp() {
  if (isDrawing) {
    drawCtx.beginPath();
    isDrawing = false;
  }
}

function getTouchPos(canvas, touch) {
  const r = canvas.getBoundingClientRect();
  return { x: touch.clientX - r.left, y: touch.clientY - r.top };
}

function onTouchStart(e) {
  e.preventDefault();
  isDrawing = true;
  const { x, y } = getTouchPos(e.target, e.touches[0]);
  drawCtx.beginPath();
  drawCtx.moveTo(x, y);
}

function onTouchMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const { x, y } = getTouchPos(e.target, e.touches[0]);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  drawCtx.beginPath();
  drawCtx.moveTo(x, y);
}

function onTouchEnd(e) {
  e.preventDefault();
  if (isDrawing) {
    drawCtx.beginPath();
    isDrawing = false;
  }
}

function revealAnswer() {
  const q = qs[idx];
  document.getElementById('correct-kanji').textContent = q.word;
  document.getElementById('answer-reveal').style.display = 'block';
  document.getElementById('btn-reveal').disabled = true;
}

function selfScore(isCorrect) {
  if (answered) return;
  answered = true;

  const q = qs[idx];
  results.push({ word: q.word, reading: q.reading, ok: isCorrect });
  if (isCorrect) score++;

  document.getElementById('btn-self-correct').disabled = true;
  document.getElementById('btn-self-wrong').disabled   = true;

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ せいかい！ すばらしい！🎉';
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = '❌ ざんねん… またれんしゅうしよう！💪';
  }

  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent   = idx === qs.length - 1 ? '結果を見る 🎊' : 'つぎへ →';
}

function checkReading() {
  if (answered) return;
  const inp = document.getElementById('ans-input');
  const val = inp.value.trim();
  if (!val) return;

  answered = true;
  inp.disabled = true;
  document.getElementById('btn-check').disabled = true;

  const q  = qs[idx];
  const ok = val === q.reading;
  results.push({ word: q.word, reading: q.reading, ok });
  if (ok) score++;
  showFeedback(ok, q.reading, val);
}

function showFeedback(ok, correctReading, userInput) {
  const fb = document.getElementById('feedback');
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ せいかい！ すばらしい！🎉';
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = userInput
      ? `❌ ざんねん…<br>あなたの答え：「${userInput}」<br>正しい答え：「<strong>${correctReading}</strong>」`
      : `❌ ざんねん…<br>正しい答えは「<strong>${correctReading}</strong>」だよ`;
  }
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent   = idx === qs.length - 1 ? '結果を見る 🎊' : 'つぎへ →';
}

function nextQ() {
  idx++;
  if (idx >= qs.length) showResult();
  else renderQ();
}

function showResult() {
  showScreen('screen-result');
  const total = qs.length;
  document.getElementById('sc-num').textContent = score;
  document.getElementById('sc-den').textContent = `/ ${total}もん`;

  const pct = score / total;
  let stars = '', msg = '', sub = '';

  if (pct >= 1.0) {
    stars = '<span>⭐</span><span>⭐</span><span>⭐</span>';
    msg   = '🎉 まんてん！ かんぺき！！';
    sub   = 'ぜんもん正解！ほんとうにすごいね！';
  } else if (pct >= 0.8) {
    stars = '<span>⭐</span><span>⭐</span>';
    msg   = 'とってもよくできました！';
    sub   = 'あとすこし！もう一度チャレンジしよう！';
  } else if (pct >= 0.6) {
    stars = '<span>⭐</span>';
    msg   = 'よくがんばりました！';
    sub   = 'まちがえた問題をくりかえし練習しよう！';
  } else {
    stars = '';
    msg   = 'もっと練習しよう！💪';
    sub   = 'なんども練習すれば必ず覚えられるよ！';
  }

  document.getElementById('stars').innerHTML    = stars;
  document.getElementById('sc-msg').textContent = msg;
  document.getElementById('sc-sub').textContent = sub;

  document.getElementById('review').innerHTML = results.map(r => `
    <div class="review-item">
      <div>
        <span class="ri-word">${r.word}</span>
        <span class="ri-reading">（${r.reading}）</span>
      </div>
      <span class="ri-status">${r.ok ? '✅' : '❌'}</span>
    </div>
  `).join('');
}

function goHome() {
  showScreen('screen-start');
}
</script>
</body>
</html>
