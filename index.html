<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字テスト</title>
<style>
/* =====================================================
   Apple Human Interface Guidelines 準拠デザインシステム
   ===================================================== */
:root {
  --blue:    #007AFF;
  --green:   #34C759;
  --orange:  #FF9500;
  --red:     #FF3B30;
  --purple:  #AF52DE;
  --bg:      #F2F2F7;
  --card:    #FFFFFF;
  --text1:   #000000;
  --text2:   rgba(60,60,67,0.60);
  --text3:   rgba(60,60,67,0.30);
  --sep:     rgba(60,60,67,0.18);
  --fill1:   rgba(120,120,128,0.12);
  --fill2:   rgba(120,120,128,0.20);
  --r-sm:    10px;
  --r-md:    14px;
  --r-lg:    20px;
  --r-xl:    28px;
}

* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; }

html, body { min-height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN',
               'Hiragino Sans', 'Yu Gothic UI', Meiryo, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 16px 16px 40px;
  -webkit-font-smoothing: antialiased;
}

/* ── コンテナ ─────────────────── */
.app { width: 100%; max-width: 540px; }

.card {
  background: var(--card);
  border-radius: var(--r-xl);
  padding: 28px 22px 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* ── 画面管理 ─────────────────── */
.screen { display: none; }

.screen.active {
  display: block;
  animation: slideInRight 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
.screen.slide-back.active {
  animation: slideInLeft 0.32s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── ステップインジケーター ─── */
.step-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.step-dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--fill1);
  color: var(--text2);
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.step-dot.active {
  background: var(--blue);
  color: #fff;
  width: 34px; height: 34px;
  font-size: 15px;
  box-shadow: 0 4px 14px rgba(0,122,255,0.45);
}
.step-dot.done { background: var(--green); color: #fff; }
.step-dot.done span { display: none; }
.step-dot.done::after { content: '✓'; font-size: 15px; font-weight: 800; }
.step-line {
  flex: 1; height: 3px; max-width: 44px;
  background: var(--fill1);
  border-radius: 2px;
  margin: 0 3px;
  transition: background 0.3s ease;
}
.step-line.done { background: var(--green); }

/* ── 戻るボタン ──────────────── */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--blue);
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 8px;
  font-family: inherit;
}
.btn-back:active { opacity: 0.55; }

/* ── アプリヘッダー ──────────── */
.app-header {
  text-align: center;
  margin-bottom: 28px;
}
.app-icon { font-size: 60px; line-height: 1; margin-bottom: 10px; display: block; }
.app-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: -0.5px;
}
.app-subtitle { font-size: 15px; color: var(--text2); margin-top: 4px; }

/* ── ステップタイトル ─────── */
.step-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text1);
  margin-bottom: 18px;
  letter-spacing: -0.3px;
}

/* ── 選択ボタングリッド ─────── */
.choice-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 20px;
}
.choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.choice-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.choice-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.choice-btn {
  padding: 16px 10px;
  border: 2px solid var(--sep);
  border-radius: var(--r-md);
  background: var(--card);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  font-family: inherit;
  color: var(--text1);
  line-height: 1.4;
  min-height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  user-select: none;
}
.choice-btn small {
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  margin-top: 3px;
  line-height: 1.3;
}
.choice-btn:active:not(.unavailable) {
  background: var(--fill1);
  transform: scale(0.96);
}
.choice-btn.selected {
  border-color: var(--blue);
  background: rgba(0,122,255,0.09);
  color: var(--blue);
}
.choice-btn.selected small { color: rgba(0,122,255,0.7); }
.choice-btn.unavailable {
  border-color: transparent;
  background: var(--fill1);
  color: var(--text3);
  cursor: not-allowed;
}

/* ── メインボタン ─────────── */
.btn-primary {
  width: 100%;
  padding: 17px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--r-md);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  font-family: inherit;
  min-height: 56px;
}
.btn-primary:active:not(:disabled) {
  background: #005ED4;
  transform: scale(0.98);
}
.btn-primary:disabled {
  background: var(--fill1);
  color: var(--text3);
  cursor: not-allowed;
}
.btn-primary.green  { background: var(--green); }
.btn-primary.green:active:not(:disabled)  { background: #28A74E; }
.btn-primary.red    { background: var(--red); }
.btn-primary.red:active:not(:disabled)    { background: #D9291E; }
.btn-primary.orange { background: var(--orange); }
.btn-primary.orange:active:not(:disabled) { background: #D97F00; }

/* ── サブボタン ─────────────── */
.btn-sub {
  width: 100%;
  padding: 15px;
  background: var(--fill1);
  color: var(--blue);
  border: none;
  border-radius: var(--r-md);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  font-family: inherit;
  min-height: 52px;
  margin-top: 10px;
}
.btn-sub:active { background: var(--fill2); transform: scale(0.98); }

/* ── 確認サマリー ────────────── */
.confirm-summary {
  background: var(--fill1);
  border-radius: var(--r-md);
  padding: 6px 18px;
  margin-bottom: 24px;
}
.confirm-row {
  display: flex;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--sep);
  gap: 12px;
}
.confirm-row:last-child { border-bottom: none; }
.confirm-icon { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
.confirm-label { font-size: 14px; color: var(--text2); flex: 1; font-weight: 500; }
.confirm-value { font-size: 18px; font-weight: 700; color: var(--text1); }

/* ── クイズ上部バー ─────────── */
.quiz-top-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.quiz-info-bar {
  flex: 1;
  background: rgba(0,122,255,0.08);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  text-align: center;
  letter-spacing: 0.2px;
}

/* ── グローバル リセットボタン（全画面 固定）── */
#btn-global-reset {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 999;
  padding: 0 16px;
  min-height: 44px;
  background: rgba(255,59,48,0.12);
  color: var(--red);
  border: none;
  border-radius: var(--r-sm);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, transform 0.1s ease;
  white-space: nowrap;
  box-shadow: 0 2px 10px rgba(255,59,48,0.15);
}
#btn-global-reset:active { background: rgba(255,59,48,0.24); transform: scale(0.96); }

/* ── 穴埋め：空欄＋ふりがな インライン ── */
.fill-blank-wrap {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  vertical-align: middle;
  line-height: 1.2;
  margin: 0 2px;
}
.fill-blank {
  font-size: inherit;
  font-weight: inherit;
  line-height: 1.3;
}
.fill-reading {
  font-size: 12px;
  color: #888;
  font-weight: 500;
  line-height: 1.3;
  letter-spacing: 0.02em;
  margin-top: 1px;
}

/* ── Enterキーヒント ──────────── */
.enter-hint {
  display: none;
  text-align: center;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}

/* ── 進捗バー ─────────────────── */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 22px;
}
.progress-label {
  font-size: 14px;
  color: var(--text2);
  white-space: nowrap;
  font-weight: 600;
  min-width: 72px;
}
.progress-track {
  flex: 1;
  background: var(--fill1);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* ── 問題タグ ─────────────────── */
.type-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 14px;
}
.type-tag.reading { background: rgba(0,122,255,0.10); color: var(--blue); }
.type-tag.writing { background: rgba(175,82,222,0.10); color: var(--purple); }
.type-tag.fill    { background: rgba(52,199,89,0.10);  color: var(--green); }

/* ── 問題ボックス ────────────── */
.question-box {
  background: var(--fill1);
  border-radius: var(--r-lg);
  padding: 28px 16px;
  margin-bottom: 18px;
  text-align: center;
}
.question-kanji {
  font-size: 60px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: 5px;
  line-height: 1.1;
}
.question-yomi {
  font-size: 36px;
  font-weight: 800;
  color: var(--text1);
  letter-spacing: 3px;
  line-height: 1.2;
}
.question-sentence-text {
  font-size: 19px;
  font-weight: 600;
  color: var(--text1);
  line-height: 2.8;
}

.fill-hint-reading {
  margin-top: 10px;
  font-size: 15px;
  color: #888;
  font-weight: 500;
  text-align: center;
}

.question-hint {
  font-size: 15px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 14px;
  font-weight: 500;
}

/* ── テキスト入力 ────────────── */
.answer-input {
  width: 100%;
  padding: 16px 18px;
  border: 2px solid var(--sep);
  border-radius: var(--r-md);
  font-size: 20px;
  font-family: inherit;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  background: var(--card);
  color: var(--text1);
  min-height: 60px;
}
.answer-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(0,122,255,0.14);
}

/* ── 答え合わせボタン ─────── */
.btn-check {
  width: 100%;
  padding: 17px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--r-md);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
  font-family: inherit;
  transition: background 0.15s ease, transform 0.1s ease;
  min-height: 56px;
}
.btn-check:active:not(:disabled) { background: #28A74E; transform: scale(0.98); }
.btn-check:disabled { background: var(--fill1); color: var(--text3); cursor: not-allowed; }

/* ── 手書きキャンバス ─────── */
.canvas-wrapper {
  width: 100%;
  aspect-ratio: 1;
  max-height: 300px;
  background: var(--card);
  border: 2px solid var(--sep);
  border-radius: var(--r-md);
  margin-bottom: 10px;
  overflow: hidden;
  cursor: crosshair;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}
#draw-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  touch-action: none;
  display: block;
}
.canvas-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.btn-canvas {
  padding: 14px 10px;
  border-radius: var(--r-sm);
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, transform 0.1s ease;
  min-height: 52px;
}
.btn-erase { background: var(--fill1); color: var(--text2); }
.btn-erase:active { background: var(--fill2); transform: scale(0.97); }
.btn-reveal { background: rgba(255,149,0,0.10); color: var(--orange); }
.btn-reveal:active:not(:disabled) { background: rgba(255,149,0,0.20); transform: scale(0.97); }
.btn-reveal:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── 正解表示 ─────────────────── */
.answer-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(0,122,255,0.06);
  border: 2px solid rgba(0,122,255,0.2);
  border-radius: var(--r-md);
  padding: 20px 16px;
  margin-bottom: 12px;
  animation: slideInRight 0.28s ease;
}
.answer-label { font-size: 15px; color: var(--text2); font-weight: 600; }
.correct-kanji { font-size: 56px; font-weight: 800; color: var(--blue); line-height: 1; }

.self-check-label {
  text-align: center;
  color: var(--text2);
  font-size: 15px;
  margin-bottom: 10px;
  font-weight: 600;
}
.self-check-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
}
.btn-self {
  padding: 16px 8px;
  border: none;
  border-radius: var(--r-md);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, transform 0.1s ease;
  min-height: 54px;
}
.btn-self-correct { background: var(--green); color: white; }
.btn-self-correct:active:not(:disabled) { background: #28A74E; transform: scale(0.97); }
.btn-self-wrong { background: var(--red); color: white; }
.btn-self-wrong:active:not(:disabled) { background: #D9291E; transform: scale(0.97); }
.btn-self:disabled { opacity: 0.38; cursor: not-allowed; }

/* ── フィードバック ─────────── */
.feedback {
  font-size: 16px;
  font-weight: 700;
  padding: 16px 18px;
  border-radius: var(--r-md);
  margin: 12px 0;
  display: none;
  line-height: 1.7;
  text-align: center;
  animation: popIn 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
.feedback.correct { display: block; background: rgba(52,199,89,0.12); color: #1B7A34; }
.feedback.wrong   { display: block; background: rgba(255,59,48,0.08); color: #C0331E; }

/* ── 次へボタン ─────────────── */
.btn-next {
  width: 100%;
  padding: 17px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: var(--r-md);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s ease, transform 0.1s ease;
  display: none;
  min-height: 56px;
  margin-top: 4px;
}
.btn-next:active { background: #005ED4; transform: scale(0.98); }

/* ── 結果画面 ─────────────────── */
.result-header { text-align: center; margin-bottom: 16px; }
.result-title { font-size: 22px; font-weight: 700; color: var(--text1); margin-bottom: 12px; }
.stars { font-size: 40px; min-height: 52px; margin-bottom: 8px; }
.stars span {
  display: inline-block;
  opacity: 0;
  animation: starPop 0.45s ease forwards;
}
.stars span:nth-child(1) { animation-delay: 0.1s; }
.stars span:nth-child(2) { animation-delay: 0.28s; }
.stars span:nth-child(3) { animation-delay: 0.46s; }
@keyframes starPop {
  0%   { opacity: 0; transform: scale(0) rotate(-20deg); }
  65%  { transform: scale(1.35) rotate(10deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.score-circle {
  width: 140px; height: 140px;
  border-radius: 50%;
  background: var(--blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 12px 36px rgba(0,122,255,0.38);
}
.score-num { font-size: 48px; font-weight: 800; color: white; line-height: 1; }
.score-den { font-size: 14px; color: rgba(255,255,255,0.82); margin-top: 4px; }
.score-msg { font-size: 20px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
.score-sub { color: var(--text2); font-size: 14px; }

.review-wrap {
  background: var(--fill1);
  border-radius: var(--r-md);
  padding: 4px 16px;
  margin: 16px 0;
  max-height: 220px;
  overflow-y: auto;
}
.review-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--sep);
  gap: 8px;
}
.review-item:last-child { border-bottom: none; }
.ri-word { font-weight: 700; font-size: 17px; color: var(--text1); }
.ri-reading { color: var(--text2); font-size: 13px; }
.ri-status { font-size: 20px; flex-shrink: 0; }

/* ── PDF モーダル（ボトムシート）── */
.pdf-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.48);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}
.pdf-overlay.open { display: flex; }

.pdf-modal {
  background: var(--card);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 0 22px 44px;
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  overflow-y: auto;
  animation: sheetUp 0.34s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.pdf-handle {
  width: 36px; height: 4px;
  background: var(--sep);
  border-radius: 2px;
  margin: 14px auto 20px;
}
.pdf-modal-title {
  font-size: 20px; font-weight: 800;
  color: var(--text1);
  text-align: center;
  margin-bottom: 20px;
}
.pdf-section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
}

/* ── PDF生成ボタン ─────────────── */
.btn-generate {
  width: 100%;
  padding: 17px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--r-md);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, transform 0.1s;
  min-height: 56px;
  margin-top: 4px;
}
.btn-generate:active:not(:disabled) { background: #28A74E; transform: scale(0.98); }
.btn-generate:disabled { background: var(--fill1); color: var(--text3); cursor: not-allowed; }

.btn-close-sheet {
  width: 100%;
  padding: 15px;
  background: var(--fill1);
  color: var(--text2);
  border: none;
  border-radius: var(--r-md);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, transform 0.1s;
  min-height: 52px;
  margin-top: 10px;
}
.btn-close-sheet:active { background: var(--fill2); transform: scale(0.98); }

let currentStep = 1;

function showScreen(id, direction) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'slide-back');
  });
  const el = document.getElementById(id);
  if (direction === 'back') el.classList.add('slide-back');
  el.classList.add('active');
}

function goToStep(n) {
  currentStep = n;
  showScreen('screen-step' + n, 'back');
}

function pickGrade(grade, btn) {
  sel.grade    = grade;
  sel.semester = null;
  sel.type     = null;
  sel.count    = null;
  currentStep  = 2;
  // 学期ボタン有効化
  updateSemesterBtns('sem-btn', grade);
  // 選択リセット
  document.querySelectorAll('#grp-semester .choice-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('#grp-type .choice-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('#grp-count .choice-btn').forEach(b => b.classList.remove('selected'));
  showScreen('screen-step2');
}

function pickSemester(semester, btn) {
  if (btn.classList.contains('unavailable')) return;
  sel.semester = semester;
  sel.type     = null;
  // 穴埋めボタン制御
  updateFillBtn(sel.grade, semester);
  document.querySelectorAll('#grp-type .choice-btn').forEach(b => b.classList.remove('selected'));
  currentStep = 3;
  showScreen('screen-step3');
}

function pickType(type, btn) {
  if (btn.classList.contains('unavailable')) return;
  sel.type  = type;
  sel.count = null;
  document.querySelectorAll('#grp-count .choice-btn').forEach(b => b.classList.remove('selected'));
  currentStep = 4;
  showScreen('screen-step4');
}

function pickCount(count, btn) {
  sel.count = count;
  // 確認画面を更新
  document.getElementById('conf-grade').textContent    = sel.grade + '年生';
  document.getElementById('conf-semester').textContent = sel.semester === 0 ? '全学期' : sel.semester + '学期';
  document.getElementById('conf-type').textContent     = typeLabel(sel.type);
  document.getElementById('conf-count').textContent    = count + '問';
  currentStep = 5;
  showScreen('screen-step5');
}

function updateSemesterBtns(prefix, grade) {
  [1, 2, 3].forEach(sem => {
    const btn = document.getElementById(prefix + '-' + sem);
    if (!btn) return;
    const hasData = DATA[grade][sem] && DATA[grade][sem].length > 0;
    btn.classList.toggle('unavailable', !hasData);
    btn.title = hasData ? '' : '準備中';
  });
}

function updateFillBtn(grade, semester) {
  const fillBtn = document.getElementById('type-fill-btn');
  if (!fillBtn) return;
  fillBtn.classList.remove('unavailable');
  fillBtn.title = '';
}

function typeLabel(type) {
  return type === 'random'  ? 'ランダム（混合）' :
         type === 'reading' ? '読みのみ' :
         type === 'writing' ? '書きのみ' : '穴埋めのみ';
}

  if (btn.classList.contains('unavailable')) return;
  pdfSel[kind] = val;
  const grpId = kind === 'grade'    ? 'pdf-grp-grade' :
                kind === 'semester' ? 'pdf-grp-semester' :
                kind === 'qtype'    ? 'pdf-grp-type' : 'pdf-grp-count';
  document.querySelectorAll('#' + grpId + ' .choice-btn')
          .forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (kind === 'grade') {
    pdfSel.semester = null; pdfSel.qtype = null;
    document.querySelectorAll('#pdf-grp-semester .choice-btn,#pdf-grp-type .choice-btn')
            .forEach(b => b.classList.remove('selected'));
    updateSemesterBtns('pdf-sem-btn', val);
  }
  if (kind === 'semester') {
    pdfSel.qtype = null;
    document.querySelectorAll('#pdf-grp-type .choice-btn').forEach(b => b.classList.remove('selected'));
    const fillBtn = document.querySelector('#pdf-grp-type .choice-btn:last-child');
    if (fillBtn) {
      const ok = !(pdfSel.grade === 3 && val === 3);
      fillBtn.classList.toggle('unavailable', !ok);
    }
    // 全学期ボタンは常に有効（全学期プールには穴埋め対応データが含まれる）
    if (val === 0) {
      if (fillBtn) fillBtn.classList.remove('unavailable');
    }
  }
  document.getElementById('btn-pdf-gen').disabled =
    !(pdfSel.grade && pdfSel.semester && pdfSel.qtype && pdfSel.count);
}

// ================================================================
//  PDF 生成
// ================================================================
function generatePdf() {
  const allData = pdfSel.semester === 0
    ? [...DATA[pdfSel.grade][1], ...DATA[pdfSel.grade][2], ...DATA[pdfSel.grade][3]]
    : DATA[pdfSel.grade][pdfSel.semester];
  const pool  = shuffle([...allData]);
  const count = pdfSel.count;
  const items = pool.slice(0, count);
  let types;
  if (pdfSel.qtype === 'reading') {
    types = Array(count).fill('reading');
  } else if (pdfSel.qtype === 'writing') {
    types = Array.from({ length: count }, (_, i) => i % 2 === 0 ? 'writing' : 'fill');
    shuffle(types);
  } else if (pdfSel.qtype === 'fill') {
    types = Array(count).fill('fill');
  } else {
    if (pdfSel.grade === 3) {
      types = Array.from({ length: count }, (_, i) => i % 2 === 0 ? 'reading' : 'writing');
    } else {
      types = Array.from({ length: count }, (_, i) => ['reading', 'writing', 'fill'][i % 3]);
    }
    shuffle(types);
  }
  const questions = items.map((q, i) => ({ ...q, qtype: types[i] }));
  const html = buildPdfHtml(pdfSel.grade, pdfSel.semester, pdfSel.qtype, count, questions);
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

function makeBlanks(word) {
  // 四角を文字数分並べる（書き・穴埋め用）
  return '<span class="ans-boxes">' +
    [...word].map(() => '<span class="ans-box"></span>').join('') +
    '</span>';
}

function makeSentenceWithBlank(sentence, word, reading) {
  const blankText = '（' + '　'.repeat(word.length) + '）';
  const blank = reading
    ? `<span class="fill-blank-wrap"><span class="fill-blank">${blankText}</span><span class="fill-reading">（${reading}）</span></span>`
    : blankText;
  if (sentence.includes(word)) {
    return sentence.replace(word, blank);
  }
  return sentence + '　' + blank;
}


function buildPdfHtml(grade, semester, qtype, count, questions) {
  const semLabel  = semester === 0 ? `${grade}年生 全学期` : `${grade}年生 ${semester}学期`;
  const typeStr   = qtype === 'reading' ? '読みのみ' :
                    qtype === 'writing' ? '書きのみ' :
                    qtype === 'fill'    ? '穴埋めのみ' : 'ランダム（混合）';

  const qHtml = questions.map((q, i) => {
    let inner = '';
    if (q.qtype === 'reading') {
      inner = `
        <div class="q-label-badge reading">読み</div>
        <div class="q-word">${q.word}</div>
        <div class="q-inst">よみかたをひらがなで書きましょう</div>
        <div class="ans-line"></div>`;
    } else if (q.qtype === 'writing') {
      const hasOku = /[ぁ-ん]$/.test(q.word);
      inner = `
        <div class="q-label-badge writing">書き</div>
        <div class="q-inst">漢字で書きましょう${hasOku ? '（送りがなも）' : ''}</div>
        <div class="ans-with-ruby">
          ${makeBlanks(q.word)}
          <div class="ans-furigana">よみ：${q.reading}</div>
        </div>`;
    } else {
      const sentenceWithRuby = q.sentence.replace(q.word,
        `<ruby>（${'　'.repeat(q.word.length)}）<rt>${q.reading}</rt></ruby>`);
      inner = `
        <div class="q-label-badge fill">穴埋め</div>
        <div class="q-sentence">${sentenceWithRuby}</div>
        <div class="q-inst">（　）に漢字を書きましょう</div>
        <div class="ans-with-ruby">
          ${makeBlanks(q.word)}
          <div class="ans-furigana">よみ：${q.reading}</div>
        </div>`;
    }
    return `
      <div class="q-card">
        <div class="q-num">（${i + 1}）</div>
        ${inner}
      </div>`;
  }).join('');

  return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>4年生 ${semLabel} 漢字テスト（${typeStr}・${count}問）</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@page { size: A4 portrait; margin: 12mm 14mm; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Meiryo,sans-serif;
  font-size: 11pt;
  color: #111;
  background: white;
}

/* 印刷コントロール（印刷時は非表示） */
.print-controls {
  background: #f0f8ff;
  border: 2px solid #4a90d9;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;

}
.print-controls p { flex: 1; color: #333; font-size: 10pt; }
.btn-print {
  padding: 10px 22px;
  background: #4a90d9;

  border: none;
  border-radius: 8px;
  font-size: 11pt;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
.btn-print:hover { background: #357abd; }

  padding: 10px 16px;
  background: white;
  color: #666;
  border: 2px solid #ccc;
  border-radius: 8px;
  font-size: 10pt;
  cursor: pointer;
  font-family: inherit;
}

/* ヘッダー */
.test-header {
  border-bottom: 2.5px solid #333;
  padding-bottom: 8px;
  margin-bottom: 10px;
}
.test-title {
  font-size: 16pt;
  font-weight: bold;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.test-meta {
  display: flex;
  justify-content: space-between;
  gap: 8px;
}
.meta-field {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10pt;
}
.meta-field .meta-label { white-space: nowrap; }

  border-bottom: 1.5px solid #333;
  min-width: 120px;

  flex: 1;
}

/* 注意書き */

  font-size: 8.5pt;
  color: #555;
  margin: 6px 0 8px;

/* 問題グリッド */
.q-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.q-card {
  border: 1px solid #bbb;
  border-radius: 4px;

  min-height: 88px;

.q-num {
  font-weight: bold;

}

}
.q-label-badge.reading { background: #dceefb; color: #1a5f9e; border: 1px solid #9bc8ef; }
.q-label-badge.writing { background: #ede7f6; color: #5e35b1; border: 1px solid #c5b0e6; }

/* 読み答え欄（下線） */

}

/* 書き・穴埋め答え欄（マス目） */
.ans-boxes {
  display: flex;
  gap: 3px;
  margin-top: 3px;

.ans-box {
  width: 42px;

  position: relative;
}
/* マス目の十字ガイド */
.ans-box::before {
  content: '';

  border-left: 1px dashed #ddd;

  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 100%; height: 0;
  border-top: 1px dashed #ddd;
}
.ans-with-ruby {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
}
.ans-furigana {
  font-size: 8.5pt;
  color: #1a5f9e;
  letter-spacing: 0.5px;
  margin-left: 1px;
}
ruby rt {
  font-size: 8pt;
  color: #1a5f9e;
  letter-spacing: 1px;
}

@media print {
  .print-controls { display: none !important; }
  body { margin: 0; }
  .q-card { break-inside: avoid; }
}
</style>
</head>
<body>

<div class="print-controls">
  <p>📄 印刷してPDFとして保存できます。「印刷する」ボタンを押してください。</p>
  <button class="btn-print" onclick="window.print()">🖨️ 印刷する</button>
  <button class="btn-close-win" onclick="window.close()">✕ 閉じる</button>
</div>

<div class="test-header">
  <div class="test-title">小学4年生 ${semLabel} 漢字テスト（${typeStr}・${count}問）</div>
  <div class="test-meta">
    <div class="meta-field" style="flex:2">
      <span class="meta-label">名前：</span>
      <span class="meta-underline"></span>
    </div>
    <div class="meta-field" style="flex:1.2">
      <span class="meta-label">日付：</span>
      <span class="meta-underline"></span>
      <span class="meta-label">月</span>
      <span class="meta-underline" style="min-width:30px;"></span>
      <span class="meta-label">日</span>
    </div>
    <div class="meta-field score">
      <span class="meta-label">点数：</span>
      <span class="meta-underline"></span>
      <span class="meta-label">点</span>
    </div>
  </div>
</div>
<div class="test-note">
  ※ 読み…漢字の読みをひらがなで書きましょう　／　書き…ひらがなを漢字で書きましょう　／　穴埋め…（　）に漢字を書きましょう
</div>

<div class="q-grid">
${qHtml}
</div>

</body>
</html>`;
}


// ================================================================
//  クイズ開始
// ================================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const count  = sel.count || 10;
  const rawPool = sel.semester === 0
    ? [...DATA[sel.grade][1], ...DATA[sel.grade][2], ...DATA[sel.grade][3]]
    : [...DATA[sel.grade][sel.semester]];
  const pool   = shuffle(rawPool);
  const qtypes = buildQtypes(sel.type, count);
  qs       = pool.slice(0, count).map((q, i) => ({ ...q, qtype: qtypes[i] }));
  idx      = 0;
  score    = 0;
  answered = false;
  results  = [];

  const gradeLabel = sel.grade + '年生';
  const semLabel   = sel.semester === 0 ? '全学期' : sel.semester + '学期';
  document.getElementById('quiz-mode-info').textContent =
    gradeLabel + ' · ' + semLabel + ' · ' + typeLabel(sel.type) + ' · ' + count + '問';

  showScreen('screen-quiz');
  renderQ();
}

function buildQtypes(type, count) {
  if (type === 'reading') return Array(count).fill('reading');
  if (type === 'writing') return Array(count).fill('writing');
  if (type === 'fill')    return Array(count).fill('fill');
  const arr = Array.from({ length: count }, (_, i) => ['reading', 'writing', 'fill'][i % 3]);
  return shuffle(arr);
}

// ================================================================
//  問題表示
// ================================================================
function renderQ() {
  answered = false;
  drawCtx  = null;
  const q     = qs[idx];
  const total = qs.length;

  document.getElementById('prog-text').textContent = '問題 ' + (idx + 1) + ' / ' + total;
  document.getElementById('prog-bar').style.width  = ((idx + 1) / total * 100) + '%';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  const nb = document.getElementById('btn-next');
  nb.style.display = 'none';
  document.getElementById('enter-hint').style.display = 'none';

  const area = document.getElementById('question-area');

  if (q.qtype === 'reading') {
    area.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <span class="type-tag reading">📖 読みテスト</span>
      </div>
      <div class="question-box">
        <div class="question-kanji">${q.word}</div>
      </div>
      <p class="question-hint">ひらがなで読みかたを入力してね</p>
      <input class="answer-input" id="ans-input" type="text"
             placeholder="ひらがなで入力…" autocomplete="off" autocorrect="off" autocapitalize="none">
      <button class="btn-check" id="btn-check">こたえる ✔</button>
    `;
    const inp = document.getElementById('ans-input');
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkReading(); });
    document.getElementById('btn-check').addEventListener('click', checkReading);
    setTimeout(() => inp.focus(), 80);

  } else if (q.qtype === 'fill') {
    const sentenceWithBlank = makeSentenceWithBlank(q.sentence, q.word, q.reading);
    area.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <span class="type-tag fill">📝 穴埋めテスト</span>
      </div>
      <div class="question-box">
        <div class="question-sentence-text">${sentenceWithBlank}</div>
      </div>
      <p class="question-hint">↓ （　）に入る漢字を手書きしてね</p>
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="draw-canvas"></canvas>
      </div>
      <div class="canvas-btns">
        <button class="btn-canvas btn-erase" id="btn-erase">消す 🗑️</button>
        <button class="btn-canvas btn-reveal" id="btn-reveal">正解を見る 👀</button>
      </div>
      <div id="answer-reveal" style="display:none;">
        <div class="answer-display">
          <div class="answer-label">正解：</div>
          <div class="correct-kanji" id="correct-kanji"></div>
        </div>
        <p class="self-check-label">自分で採点してね</p>
        <div class="self-check-btns">
          <button class="btn-self btn-self-correct" id="btn-self-correct">✅ 合ってた！</button>
          <button class="btn-self btn-self-wrong"   id="btn-self-wrong">❌ 間違ってた</button>
        </div>
      </div>
    `;
    document.getElementById('btn-erase').addEventListener('click', clearCanvas);
    document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
    document.getElementById('btn-self-correct').addEventListener('click', () => selfScore(true));
    document.getElementById('btn-self-wrong').addEventListener('click',   () => selfScore(false));
    setTimeout(initCanvas, 0);

  } else {
    area.innerHTML = `
      <div style="text-align:center;margin-bottom:12px;">
        <span class="type-tag writing">✏️ 書きテスト</span>
      </div>
      <div class="question-box">
        <div class="question-yomi">${q.reading}</div>
      </div>
      <p class="question-hint">↓ 枠の中に漢字を手書きしてね</p>
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="draw-canvas"></canvas>
      </div>
      <div class="canvas-btns">
        <button class="btn-canvas btn-erase" id="btn-erase">消す 🗑️</button>
        <button class="btn-canvas btn-reveal" id="btn-reveal">正解を見る 👀</button>
      </div>
      <div id="answer-reveal" style="display:none;">
        <div class="answer-display">
          <div class="answer-label">正解：</div>
          <div class="correct-kanji" id="correct-kanji"></div>
        </div>
        <p class="self-check-label">自分で採点してね</p>
        <div class="self-check-btns">
          <button class="btn-self btn-self-correct" id="btn-self-correct">✅ 合ってた！</button>
          <button class="btn-self btn-self-wrong"   id="btn-self-wrong">❌ 間違ってた</button>
        </div>
      </div>
    `;
    document.getElementById('btn-erase').addEventListener('click', clearCanvas);
    document.getElementById('btn-reveal').addEventListener('click', revealAnswer);
    document.getElementById('btn-self-correct').addEventListener('click', () => selfScore(true));
    document.getElementById('btn-self-wrong').addEventListener('click',   () => selfScore(false));
    setTimeout(initCanvas, 0);
  }
}

// ================================================================
//  キャンバス
// ================================================================
function initCanvas() {
  const canvas  = document.getElementById('draw-canvas');
  const wrapper = document.getElementById('canvas-wrapper');
  if (!canvas || !wrapper) return;
  const dpr  = window.devicePixelRatio || 1;
  canvasCSS  = wrapper.clientWidth;
  const h    = wrapper.clientHeight;
  canvas.width  = Math.round(canvasCSS * dpr);
  canvas.height = Math.round(h * dpr);
  drawCtx = canvas.getContext('2d');
  drawCtx.scale(dpr, dpr);
  drawGuideLines();
  drawCtx.strokeStyle = '#1a1a2e';
  drawCtx.lineWidth   = 5;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';
  canvas.addEventListener('mousedown',  onMouseDown);
  canvas.addEventListener('mousemove',  onMouseMove);
  canvas.addEventListener('mouseup',    onMouseUp);
  canvas.addEventListener('mouseleave', onMouseUp);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
}

function drawGuideLines() {
  if (!drawCtx) return;
  const w = document.getElementById('canvas-wrapper').clientWidth;
  const h = document.getElementById('canvas-wrapper').clientHeight;
  const m = 10;
  drawCtx.save();
  drawCtx.strokeStyle = '#d0d0e8';
  drawCtx.lineWidth   = 1;
  drawCtx.setLineDash([5, 5]);
  drawCtx.beginPath();
  drawCtx.moveTo(w / 2, m);       drawCtx.lineTo(w / 2, h - m);
  drawCtx.moveTo(m, h / 2);       drawCtx.lineTo(w - m, h / 2);
  drawCtx.stroke();
  drawCtx.setLineDash([]);
  drawCtx.restore();
}

function clearCanvas() {
  if (!drawCtx) return;
  const w = document.getElementById('canvas-wrapper').clientWidth;
  const h = document.getElementById('canvas-wrapper').clientHeight;
  drawCtx.clearRect(0, 0, w, h);
  drawGuideLines();
  drawCtx.strokeStyle = '#1a1a2e';
  drawCtx.lineWidth   = 5;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';
}

function getPos(canvas, e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function onMouseDown(e) {
  isDrawing = true;
  const { x, y } = getPos(e.target, e);
  drawCtx.beginPath(); drawCtx.moveTo(x, y);
}
function onMouseMove(e) {
  if (!isDrawing) return;
  const { x, y } = getPos(e.target, e);
  drawCtx.lineTo(x, y); drawCtx.stroke();
  drawCtx.beginPath(); drawCtx.moveTo(x, y);
}
function onMouseUp() {
  if (isDrawing) { drawCtx.beginPath(); isDrawing = false; }
}
function getTouchPos(canvas, touch) {
  const r = canvas.getBoundingClientRect();
  return { x: touch.clientX - r.left, y: touch.clientY - r.top };
}
function onTouchStart(e) {
  e.preventDefault(); isDrawing = true;
  const { x, y } = getTouchPos(e.target, e.touches[0]);
  drawCtx.beginPath(); drawCtx.moveTo(x, y);
}
function onTouchMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const { x, y } = getTouchPos(e.target, e.touches[0]);
  drawCtx.lineTo(x, y); drawCtx.stroke();
  drawCtx.beginPath(); drawCtx.moveTo(x, y);
}
function onTouchEnd(e) {
  e.preventDefault();
  if (isDrawing) { drawCtx.beginPath(); isDrawing = false; }
}

function revealAnswer() {
  const q = qs[idx];
  document.getElementById('correct-kanji').textContent = q.word;
  document.getElementById('answer-reveal').style.display = 'block';
  document.getElementById('btn-reveal').disabled = true;
}

function selfScore(isCorrect) {
  if (answered) return;
  answered = true;
  const q = qs[idx];
  results.push({ word: q.word, reading: q.reading, ok: isCorrect });
  if (isCorrect) score++;
  document.getElementById('btn-self-correct').disabled = true;
  document.getElementById('btn-self-wrong').disabled   = true;
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ せいかい！ すばらしい！🎉';
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = '❌ ざんねん… またれんしゅうしよう！💪';
  }
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent   = idx === qs.length - 1 ? '結果を見る 🎊' : 'つぎへ →';
}

function checkReading() {
  if (answered) return;
  const inp = document.getElementById('ans-input');
  const val = inp.value.trim();
  if (!val) { inp.classList.add('shake'); setTimeout(() => inp.classList.remove('shake'), 500); return; }
  answered = true;
  inp.disabled = true;
  document.getElementById('btn-check').disabled = true;
  const q  = qs[idx];
  const ok = val === q.reading;
  results.push({ word: q.word, reading: q.reading, ok });
  if (ok) score++;
  showFeedback(ok, q.reading, val);
}

function showFeedback(ok, correctReading, userInput) {
  const fb = document.getElementById('feedback');
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '✅ せいかい！ すばらしい！🎉';
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = userInput
      ? `❌ ざんねん…<br>あなたの答え：「${userInput}」<br>正しい答え：「<strong>${correctReading}</strong>」`
      : `❌ ざんねん…<br>正しい答えは「<strong>${correctReading}</strong>」だよ`;
  }
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent   = idx === qs.length - 1 ? '結果を見る 🎊' : 'つぎへ →';
  document.getElementById('enter-hint').style.display = 'block';
}

function nextQ() {
  idx++;
  if (idx >= qs.length) showResult();
  else renderQ();
}

// ================================================================
//  結果画面
// ================================================================
function showResult() {
  showScreen('screen-result');
  const total = qs.length;
  document.getElementById('sc-num').textContent = score;
  document.getElementById('sc-den').textContent = '/ ' + total + 'もん';
  const pct = score / total;
  let stars = '', msg = '', sub = '';
  if (pct >= 1.0) {
    stars = '<span>⭐</span><span>⭐</span><span>⭐</span>';
    msg   = '🎉 まんてん！ かんぺき！！';
    sub   = 'ぜんもん正解！ほんとうにすごいね！';
  } else if (pct >= 0.8) {
    stars = '<span>⭐</span><span>⭐</span>';
    msg   = 'とってもよくできました！';
    sub   = 'あとすこし！もう一度チャレンジしよう！';
  } else if (pct >= 0.6) {
    stars = '<span>⭐</span>';
    msg   = 'よくがんばりました！';
    sub   = 'まちがえた問題をくりかえし練習しよう！';
  } else {
    stars = '';
    msg   = 'もっと練習しよう！💪';
    sub   = 'なんども練習すれば必ず覚えられるよ！';
  }
  document.getElementById('stars').innerHTML    = stars;
  document.getElementById('sc-msg').textContent = msg;
  document.getElementById('sc-sub').textContent = sub;
  document.getElementById('review').innerHTML = results.map(r => `
    <div class="review-item">
      <div>
        <span class="ri-word">${r.word}</span>
        <span class="ri-reading">（${r.reading}）</span>
      </div>
      <span class="ri-status">${r.ok ? '✅' : '❌'}</span>
    </div>
  `).join('');
}

function confirmReset() {
  location.reload();
}

// ── Enterキーで次へ進む（読み・穴埋めのみ、手書きは除く）────────
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const screen = document.getElementById('screen-quiz');
  if (!screen || !screen.classList.contains('active')) return;
  if (!answered) return;
  if (document.getElementById('draw-canvas')) return; // 手書きは除外
  const nb = document.getElementById('btn-next');
  if (nb && nb.style.display !== 'none') {
    e.preventDefault();
    nextQ();
  }
});

function goHome() {
  sel = { grade: null, semester: null, type: null, count: null };
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  currentStep = 1;
  showScreen('screen-step1', 'back');
}
</script>
</body>
